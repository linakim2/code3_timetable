<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODE3 강좌 시간표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --red-l:#FEE9E9;--red-m:#E05252;--red-d:#922020;
  --blue-l:#E6F1FB;--blue-m:#378ADD;--blue-d:#0C447C;
  --violet-l:#EEEDFE;--violet-m:#7F77DD;--violet-d:#3C3489;
  --amber-l:#FAEEDA;--amber-m:#BA7517;--amber-d:#633806;
  --red-l:#FCEBEB;--red-m:#E24B4A;--red-d:#A32D2D;
  --gray-bg:#F7F6F3;--bdr:#E0DDD6;--txt:#1a1a1a;--txt2:#666;--w:#fff;
  --slot:24px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--gray-bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{background:var(--w);border-bottom:1px solid var(--bdr);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:300;isolation:isolate}
.logo h1{font-size:18px;font-weight:700;letter-spacing:-.5px}
.logo p{font-size:11px;color:var(--txt2);margin-top:1px}
.hbtns{display:flex;gap:6px;align-items:center}
.btn{font-family:inherit;font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;border:1px solid var(--bdr);background:var(--w);color:var(--txt);transition:all .15s;font-weight:500}
.btn:hover{background:var(--gray-bg)}
.btn-p{background:var(--txt);color:var(--w);border-color:var(--txt)}
.btn-p:hover{background:#333}
.btn-danger{background:var(--red-l);color:var(--red-d);border-color:var(--red-m)}


/* NAV BAR */
.nav-bar{background:var(--w);border-bottom:1px solid var(--bdr);padding:8px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:200;backdrop-filter:blur(0)}
.nav-center{display:flex;align-items:center;gap:10px}
.nav-arrow{background:none;border:1px solid var(--bdr);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:14px;color:var(--txt2)}
.nav-arrow:hover{background:var(--gray-bg)}
.nav-label{font-size:14px;font-weight:500;min-width:160px;text-align:center}
.nav-today{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--bdr);background:var(--w);cursor:pointer;color:var(--txt2);font-family:inherit}
.nav-today:hover{background:var(--gray-bg)}
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{font-size:11px;padding:3px 11px;border-radius:999px;border:1px solid var(--bdr);background:var(--w);color:var(--txt2);cursor:pointer;font-family:inherit;transition:all .15s}
.chip:hover{border-color:#aaa;color:var(--txt)}
.chip.on{background:var(--txt);color:var(--w);border-color:var(--txt)}
.chip.on-국어{background:var(--red-l);color:var(--red-d);border-color:var(--red-m)}
.chip.on-수학{background:var(--blue-l);color:var(--blue-d);border-color:var(--blue-m)}
.chip.on-과탐{background:var(--violet-l);color:var(--violet-d);border-color:var(--violet-m)}
.chip.on-사탐{background:var(--amber-l);color:var(--amber-d);border-color:var(--amber-m)}
.chip.on-수업{background:#E0E0E0;color:#333;border-color:#999}
.chip.on-클리닉{background:#E0E0E0;color:#333;border-color:#999}
.chip.on-특강{background:#E0E0E0;color:#333;border-color:#999}
.chip.on-설명회{background:#E0E0E0;color:#333;border-color:#999}
.chip.on-기타{background:#E0E0E0;color:#333;border-color:#999}
.sep{width:1px;height:16px;background:var(--bdr)}

/* MAIN */
main{padding:16px 24px}

/* CALENDAR WRAPPER */
.cal-outer{background:var(--w);border-radius:12px;border:1px solid var(--bdr);overflow-x:auto;overflow-y:visible}

/* GRID uses CSS vars set by JS */
.cal-grid{
  display:grid;
  /* columns set inline by JS: time-col + N day-columns */
  min-width:max-content;
}

/* Header cells */
.gh{
  background:#FAFAF8;
  border-bottom:1px solid var(--bdr);
  border-right:1px solid var(--bdr);
  font-size:11px;font-weight:500;color:var(--txt2);
  padding:8px 4px;text-align:center;
  position:sticky;top:0;z-index:10;box-shadow:0 1px 0 var(--bdr);
}
.gh:last-child{border-right:none}
.day-sep{border-right:3px solid #999590 !important}
.gh.day-sep{border-right:3px solid #999590 !important}
.gh.today-head{color:var(--blue-d);background:var(--blue-l)}
.gh .sub{font-size:10px;font-weight:400;opacity:.7;display:block;margin-top:1px}

/* Time cells */
.tc{
  background:#FAFAF8;
  border-bottom:1px solid #F0EEE9;
  border-right:1px solid var(--bdr);
  font-size:10px;color:#aaa;font-weight:400;
  padding:0 6px 0 0;text-align:right;
  height:var(--slot);line-height:var(--slot);
  position:sticky;left:0;z-index:5;
  white-space:nowrap;
}

/* Day cells */
.dc{
  border-right:1px solid var(--bdr);
  border-bottom:1px solid #F0EEE9;
  position:relative;
  height:var(--slot);
  cursor:pointer;
  overflow:hidden;
  min-width:0;
}
.dc:last-child{border-right:none}
.dc:hover::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.025);pointer-events:none}
.dc.today-col{background:rgba(55,138,221,.015)}

/* EVENTS */
.ev{
  border-radius:8px;padding:6px 7px 5px;
  font-size:9.5px;line-height:1.35;cursor:pointer;
  overflow:hidden;z-index:2;
  transition:opacity .15s,box-shadow .15s,transform .1s;
  display:flex;flex-direction:column;gap:2px;
  justify-content:flex-start;
  align-items:stretch;
  box-sizing:border-box;
  min-width:0;
  border-left:none !important;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
  align-self:stretch;
}
.ev:hover{opacity:.88;box-shadow:0 3px 12px rgba(0,0,0,.15);transform:translateY(-1px);z-index:20}
.ev-type-clinic{background:#E8E8E8 !important;color:#555 !important;border-left:none !important;position:relative;overflow:hidden}
.ev-type-clinic::before{content:'';position:absolute;top:0;left:0;width:4px;height:40%;border-radius:8px 0 4px 0;opacity:.8;background:var(--clinic-accent,#888)}
.ev-type-event{background:#C8F0E0 !important;color:#085041 !important;border-left:none !important}
.ev.faded{opacity:.25}
.ev-국어{background:#FADADD;color:#8B1A2B}
.ev-수학{background:#D6E8FA;color:#1A4F7A}
.ev-과탐{background:#E0D6F9;color:#3D2080}
.ev-사탐{background:#FFF0CC;color:#7A4F00}
.ev-기타{background:#FFE8CC;color:#7A3F00}
/* event inner layout */
.ev-top{display:flex;align-items:flex-start;justify-content:space-between;gap:3px}
.ev-name{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.ev-badge{font-size:8px;font-weight:500;padding:1px 4px;border-radius:3px;flex-shrink:0;white-space:nowrap;opacity:.9}
.badge-수업  {background:rgba(0,0,0,.1);border-radius:4px}
.badge-클리닉{background:rgba(0,0,0,.13)}
.badge-특강  {background:rgba(200,140,0,.2)}
.badge-설명회{background:rgba(150,0,200,.15)}
.badge-기타{background:rgba(100,100,100,.12)}
.ev-teacher{font-size:10px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.ev-time{font-size:8px;opacity:.58;white-space:nowrap}
.ev-room{font-size:10px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:auto;align-self:flex-end}
/* 휴강 */
.ev.ev-closed{opacity:.3;filter:grayscale(1);pointer-events:auto}
.ev.ev-closed .ev-badge.badge-휴강{opacity:1 !important;filter:none !important;background:#C0392B;color:#fff;font-weight:600}

.badge-휴강{background:#C0392B;color:#fff;font-weight:600}
.badge-대체{background:rgba(0,140,80,.18);color:#085041}
.duty-row{
  display:flex;align-items:center;gap:6px;
  padding:4px 8px;font-size:11px;
  background:#F7F6F3;border-bottom:1px solid var(--bdr);
  border-right:1px solid var(--bdr);min-height:26px;
}
.duty-row:last-child{border-right:none}
.duty-row.today-col{background:rgba(55,138,221,.06)}
.duty-label{font-size:10px;color:var(--txt2);flex-shrink:0}
.duty-name{font-size:11px;font-weight:500;color:var(--txt);cursor:pointer}
.duty-name:hover{text-decoration:underline}
.duty-empty{font-size:10px;color:#ccc;cursor:pointer}
.duty-empty:hover{color:var(--txt2)}


/* Legend */
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--txt2)}
.leg-bar{width:10px;height:10px;border-radius:2px}
.hint{margin-left:auto;font-size:10px;color:#bbb}

/* DETAIL POPUP */
.dp{display:none;position:fixed;z-index:600;background:var(--w);border:1px solid var(--bdr);border-radius:12px;padding:14px;min-width:210px;max-width:260px;box-shadow:0 8px 28px rgba(0,0,0,.1)}
.dp.show{display:block}
.dp-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.dp-hd h3{font-size:13px;font-weight:600;line-height:1.3}
.dp-acts{display:flex;gap:4px;flex-shrink:0}
.dpb{font-family:inherit;font-size:10px;padding:3px 8px;border-radius:5px;cursor:pointer;border:1px solid var(--bdr);background:var(--w);color:var(--txt2)}
.dpb:hover{background:var(--gray-bg)}
.dpb.del{color:var(--red-d);border-color:var(--red-m);background:var(--red-l)}
.dp-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #F5F3EF;font-size:11px;gap:8px}
.dp-row:last-child{border-bottom:none}
.dp-row .k{color:var(--txt2)}
.dp-row .v{font-weight:500;text-align:right}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:700;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--w);border-radius:16px;padding:26px;width:470px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mhd h2{font-size:16px;font-weight:600}
.xbtn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--txt2);padding:2px 6px;border-radius:6px}
.xbtn:hover{background:var(--gray-bg)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:4px;margin-top:12px}
.field label{font-size:11px;font-weight:500;color:var(--txt2)}
.field input,.field select{font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--bdr);border-radius:8px;background:var(--w);color:var(--txt);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--blue-m)}
.daychk{display:flex;gap:6px;flex-wrap:wrap}
.daychk label{display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer}
.daychk input{width:13px;height:13px;accent-color:var(--blue-m)}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--bdr)}
.conflict-warn{font-size:11px;color:var(--red-d);background:var(--red-l);border:1px solid var(--red-m);border-radius:7px;padding:7px 10px;margin-top:10px;display:none}

footer{text-align:center;padding:16px;font-size:10px;color:#bbb}
.work-row{
  display:flex;align-items:flex-start;flex-direction:column;gap:2px;
  padding:4px 8px;font-size:10px;
  background:#FAFAF8;border-bottom:1px solid var(--bdr);
  border-right:1px solid var(--bdr);min-height:36px;overflow:hidden;
}
.work-row.today-col{background:rgba(55,138,221,.04)}
.work-item{display:flex;align-items:center;gap:4px;white-space:nowrap}
.work-teacher{font-size:9px;font-weight:600;color:var(--txt2)}
.work-time{font-size:9px;color:#888}
.day-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.day-row label{display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;min-width:36px}
.day-row input[type=checkbox]{width:13px;height:13px;accent-color:var(--blue-m)}
.day-time-toggle{font-size:10px;color:var(--blue-m);cursor:pointer;padding:2px 6px;border:1px solid var(--blue-m);border-radius:4px;white-space:nowrap}
.day-time-toggle:hover{background:var(--blue-l)}
.day-time-inputs{display:flex;align-items:center;gap:4px;font-size:11px}
.day-time-inputs input[type=time]{font-family:inherit;font-size:11px;padding:3px 5px;border:1px solid var(--bdr);border-radius:6px;width:90px;min-width:90px}

/* 로딩 스피너 */
.date-range-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.date-range-row input{font-family:inherit;font-size:12px;padding:6px 8px;border:1px solid var(--bdr);border-radius:7px;flex:1;min-width:120px}
.date-range-row .remove-btn{font-size:11px;color:#c00;border:1px solid #c00;background:#fff;border-radius:5px;padding:3px 8px;cursor:pointer;white-space:nowrap;font-family:inherit}
.date-range-row .remove-btn:hover{background:#FEE9E9}
.viewer-limit-banner{
  display:none;
  background:#FEE9E9;border-bottom:1px solid var(--red-m);
  padding:6px 24px;font-size:12px;color:var(--red-d);
  text-align:center;font-weight:500;
}
.loading-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(247,246,243,.85);
  z-index:9999;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.loading-overlay.show{display:flex}
.loading-spinner{
  width:36px;height:36px;
  border:3px solid var(--bdr);
  border-top-color:var(--blue-m);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--txt2);font-weight:400}

/* ═══════════════════════════════
   반응형 - 모바일
═══════════════════════════════ */
@media (max-width: 768px) {
  /* 헤더 */
  header{padding:10px 14px;gap:8px}
  .logo h1{font-size:15px}
  .logo p{font-size:10px}
  .hbtns{gap:5px}
  .btn{font-size:11px;padding:5px 10px}

  /* 네비 바 */
  .nav-bar{padding:7px 14px;gap:6px;flex-direction:column;align-items:stretch}
  .filters{justify-content:flex-start}
  .nav-center{justify-content:center}
  .nav-label{font-size:12px;min-width:120px}
  .filters{gap:4px;justify-content:center}
  .chip{font-size:10px;padding:3px 9px}
  .sep{display:block;width:100%;height:0;border:none}

  /* 메인 */
  main{padding:10px 10px}
  .legend{gap:8px;margin-bottom:8px}
  .leg{font-size:10px}

  /* 캘린더 */
  :root{--slot:28px}
  .col-head{font-size:10px;padding:6px 2px}
  .col-head .sub{font-size:9px}
  .tc{font-size:8px;padding:1px 3px 0 0;width:36px}
  .cal-grid{grid-template-columns:36px repeat(var(--day-cols,7),minmax(90px,1fr)) !important}

  /* 이벤트 블록 */
  .ev{padding:2px 4px}
  .ev-name{font-size:8.5px}
  .ev-badge{font-size:7px;padding:1px 3px}
  .ev-teacher{font-size:7.5px}
  .ev-time{font-size:7px}
  .ev-room{font-size:8.5px}

  /* 팝업 */
  .dp{min-width:180px;max-width:90vw;padding:12px;font-size:12px}
  .dp-hd h3{font-size:12px}
  .dpb{font-size:10px;padding:3px 7px}
  .dp-row{font-size:11px}

  /* 모달 */
  .modal{padding:18px;width:95vw}
  .fg{grid-template-columns:1fr}
  .mhd h2{font-size:14px}
  .field label{font-size:11px}
  .field input,.field select{font-size:12px;padding:7px 9px}

  /* 배너 */
  .date-range-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.date-range-row input{font-family:inherit;font-size:12px;padding:6px 8px;border:1px solid var(--bdr);border-radius:7px;flex:1;min-width:120px}
.date-range-row .remove-btn{font-size:11px;color:#c00;border:1px solid #c00;background:#fff;border-radius:5px;padding:3px 8px;cursor:pointer;white-space:nowrap;font-family:inherit}
.date-range-row .remove-btn:hover{background:#FEE9E9}
.viewer-limit-banner{font-size:11px;padding:5px 14px}
  #viewer-bar{font-size:10px;padding:4px 14px}

  /* 로딩 */
  .loading-text{font-size:12px}
}

@media (max-width: 480px) {
  header{flex-direction:column;align-items:flex-start;gap:6px}
  .hbtns{width:100%;justify-content:flex-end}
  .nav-center{gap:6px}
  .nav-label{font-size:11px;min-width:100px}
  :root{--slot:26px}
  .cal-grid{grid-template-columns:32px repeat(var(--day-cols,7),minmax(72px,1fr)) !important}
  .tc{width:32px;font-size:7px}
  .col-head{font-size:9px}
}

@media (max-width: 480px) {
  .btn-full{display:none}
  .btn-short{display:inline !important}
  .btn{padding:5px 8px}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>CODE3 강좌 시간표</h1>
    
  </div>
  <div class="hbtns">

    <span id="admin-btns" style="display:none;gap:6px;align-items:center">
      <button class="btn" onclick="openHolidayModal()"><span class="btn-full">🚫 휴강 등록</span><span class="btn-short" style="display:none">🚫</span></button>
      <button class="btn btn-p" onclick="openAddModal()"><span class="btn-full">+ 강좌 추가</span><span class="btn-short" style="display:none">+</span></button>
    </span>
    <button id="admin-login-btn" class="btn" onclick="adminLogin()" style="display:none">🔐 관리자</button>
  </div>
</header>
<div id="viewer-bar" style="display:none;background:var(--blue-l);border-bottom:1px solid var(--blue-m);padding:5px 24px;font-size:11px;color:var(--blue-d);text-align:center;position:sticky;top:0;z-index:199;">
  👁 읽기 전용 · 강좌 수정은 관리자에게 문의하세요
</div>
<div class="viewer-limit-banner" id="viewer-limit-banner" style="position:sticky;top:0;z-index:198;">
  ⚠ 3주 이전/이후 일정은 확인이 어렵습니다. 자세한 내용은 관리자에게 문의해 주세요.
</div>

<div class="nav-bar">
  <div class="nav-center">
    <button class="nav-arrow" id="nav-prev" onclick="navigate(-1)">&#8592;</button>
    <span class="nav-label" id="nav-label"></span>
    <button class="nav-arrow" id="nav-next" onclick="navigate(1)">&#8594;</button>
    <button class="nav-today" onclick="goToday()">오늘</button>
  </div>
  <div class="filters">
    <span style="font-size:11px;color:var(--txt2);font-weight:500">과목</span>
    <button class="chip on" data-f="subject" data-v="전체">전체</button>
    <button class="chip" data-f="subject" data-v="국어">국어</button>
    <button class="chip" data-f="subject" data-v="수학">수학</button>
    <button class="chip" data-f="subject" data-v="과탐">과탐</button>
    <button class="chip" data-f="subject" data-v="사탐">사탐</button>
    <div class="sep"></div>
    <span style="font-size:11px;color:var(--txt2);font-weight:500">유형</span>
    <button class="chip on" data-f="type" data-v="전체">전체</button>
    <button class="chip" data-f="type" data-v="수업">수업</button>
    <button class="chip" data-f="type" data-v="클리닉">클리닉</button>
    <button class="chip" data-f="type" data-v="특강">특강</button>
    <button class="chip" data-f="type" data-v="설명회">설명회</button>
    <button class="chip" data-f="type" data-v="기타">기타</button>
  </div>
</div>

<script>
// ═══════════════════════════════
//  CONSTANTS
// ═══════════════════════════════
const DAYS_KR   = ['일','월','화','수','목','금','토'];
const DAYS_ORDER= ['목','금','토','일','월','화','수']; // week display order
const START_H=6, END_H=23, SLOT_MIN=30, SLOT_PX=24;
const TOTAL_SLOTS=(END_H-START_H)*60/SLOT_MIN;
// ── Google Sheets 연동 설정 ──
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYALmGJmTEVHHiTcU7YLY-n9xYpAeHa1IZp66kkhkrzW4mx-8KHhFloJAJNe6XLKlMJg/exec'; // Apps Script 배포 URL 입력
const IS_ADMIN   = location.search.includes('admin'); // URL에 ?admin 붙이면 관리자

// Sheets 연동 - localStorage 미사용

// ═══════════════════════════════
//  STATE
// ═══════════════════════════════
let courses=[], holidays=[], replaces=[], duty=[], dateEvents=[], curDate=new Date();


curDate.setHours(0,0,0,0);
let activeSubs=new Set(['전체']), activeTypes=new Set(['전체']);
let editingId=null, dpActiveId=null;

// ═══════════════════════════════
//  UTILS
// ═══════════════════════════════
function toMins(t){
  if(!t) return 0;
  const [h,m]=(t+'').split(':').map(Number);
  return h*60+(m||0);
}
function pad2(n){return String(n).padStart(2,'0')}
function fmtDate(d){return `${d.getFullYear()}.${pad2(d.getMonth()+1)}.${pad2(d.getDate())}`}
function dayKr(d){return DAYS_KR[d.getDay()]}
function dateAddDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}

function overlaps(a,b){
  return toMins(a.start)<toMins(b.end) && toMins(a.end)>toMins(b.start);
}
function subjectColor(s){
  return {국어:'국어',수학:'수학',과탐:'과탐',사탐:'사탐'}[s]||'기타';
}
function nextId(){return 'C'+Date.now()+Math.random().toString(36).slice(2,5)}

// ═══════════════════════════════
//  STORAGE
// ═══════════════════════════════
function save(){updateCount()} // Sheets에서 관리 - localStorage 불필요
function saveHolidays(){} // Sheets에서 관리 - localStorage 불필요

// Apps Script fetch (redirect:follow 로 CORS 우회)
function fetchGAS(url){
  return fetch(url,{redirect:'follow'}).then(r=>r.json());
}

async function sheetPost(action, data){
  if(!IS_ADMIN) return;
  if(SCRIPT_URL==='YOUR_APPS_SCRIPT_URL_HERE') return; // 연동 전
  const pw=sessionStorage.getItem('admin_pw')||'';
  await fetch(SCRIPT_URL,{
    method:'POST',
    redirect:'follow',
    headers:{'Content-Type':'text/plain'}, // Apps Script POST는 text/plain 필요
    body:JSON.stringify({password:pw,action,data}),
  });
}
// holidays는 위에서 선언됨
function updateCount(){}

async function load(){
  if(SCRIPT_URL==='YOUR_APPS_SCRIPT_URL_HERE'){
    // SCRIPT_URL 미설정: 기본 샘플 데이터 사용
    courses=defaultCourses();
    holidays=[];
    replaces=[];
    return;
  }
  showLoading(true);
  try{
    const allData=await fetchGAS(SCRIPT_URL+'?action=all');
    if(allData.ok){
      courses=(allData.data.courses||[]).map(normalizeSheetCourse);
      holidays=allData.data.holidays||[];
      replaces=allData.data.replaces||[];
      duty=allData.data.duty||[];
      dateEvents=allData.data.events||[];

    } else {
      showError('데이터 로드 실패: '+allData.error);
    }
  }catch(e){
    showError('Google Sheets 연결 실패. Apps Script 배포 설정을 확인해주세요.<br><small>'+e.message+'</small>');
    courses=[];holidays=[];replaces=[];
  }finally{
    showLoading(false);
  }
}

function showError(msg){
  let el=document.getElementById('error-bar');
  if(!el){
    el=document.createElement('div');
    el.id='error-bar';
    el.style.cssText='position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#922020;color:#fff;font-size:12px;padding:10px 18px;border-radius:8px;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.2);max-width:90vw;text-align:center';
    document.body.appendChild(el);
  }
  el.innerHTML=msg;
  el.style.display='block';
  setTimeout(()=>el.style.display='none', 8000);
}

// Date 객체나 Date 문자열 → "HH:MM" 변환
function parseTime(v){
  if(!v) return '';
  const s = String(v);
  // 이미 HH:MM 형식
  if(/^\d{1,2}:\d{2}$/.test(s)) return s.padStart(5,'0');
  // Date 문자열 (Sat Dec 30 1899 18:30:00 ...)
  const m = s.match(/(\d{1,2}):(\d{2}):\d{2}/);
  if(m) return m[1].padStart(2,'0')+':'+m[2];
  return '';
}
// Date 객체나 Date 문자열 → "yyyy-MM-dd" 변환
function parseDate(v){
  if(!v) return '';
  const s = String(v);
  // 이미 yyyy-MM-dd 형식
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // Date 문자열 파싱
  try{
    const d = new Date(s);
    if(!isNaN(d)) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }catch(e){}
  return '';
}

function normalizeSheetCourse(r){
  const days = Array.isArray(r.days) ? r.days
    : (r['요일'] ? String(r['요일']).split(/[,·\/]/).map(s=>s.trim()).filter(Boolean) : []);
  return {
    id:         r.id        || r['COURSE_ID'] || '',
    subject:    r.subject   || r['과목']      || '',
    name:       r.name      || r['강좌명']    || '',
    teacher:    r.teacher   || r['선생님']    || '',
    type:       r.type      || r['유형']      || '수업',
    days,
    start:      parseTime(r.start  || r['시작']),
    end:        parseTime(r.end    || r['종료']),
    room:       r.room      || r['강의실']    || '',
    memo:       r.memo      || r['메모']      || '',
    startDate:  parseDate(r.startDate || r['개강일']),
    endDate:    parseDate(r.endDate   || r['종강일']),
    endMode:    r.endMode   || r['종강방식']  || '없음',
    totalCount: parseInt(r.totalCount || r['총회차']) || 0,
    dayTimes: r.dayTimes || {},
  };
}

function showLoading(on){
  const el=document.getElementById('loading-overlay');
  if(el) el.classList.toggle('show',on);
}

// ═══════════════════════════════
//  COLUMN LAYOUT ENGINE
//
//  규칙:
//  - 한 열(lane)에는 같은 과목만 들어갈 수 있음 (다른 과목은 무조건 새 열)
//  - 같은 과목 열 중 시간이 안 겹치는 열 탐색:
//      Pass 1: 같은 과목 & 같은 선생님 & 안 겹침  → 그 열에 추가
//      Pass 2: 같은 과목 & 선생님 무관 & 안 겹침  → 그 열에 추가
//      Pass 3: 위 모두 실패                       → 새 열 추가 (빈 열 재활용 없음)
// ═══════════════════════════════
function computeLanes(dayCourses){
  const sorted=[...dayCourses].sort((a,b)=>toMins(a.start)-toMins(b.start));
  const lanes=[];

  // 선생님 공유 여부 (복수 선생님 대응)
  function shareTeacher(a,b){
    const ta=new Set((a.teacher||'').split(/[,·]/));
    const tb=new Set((b.teacher||'').split(/[,·]/));
    for(const t of ta) if(t&&tb.has(t)) return true;
    return false;
  }

  for(const c of sorted){
    const sameSbjLanes=lanes.map((l,i)=>({i,l})).filter(({l})=>l.subject===c.subject);
    let bestLane=-1;

    // Pass 1: 같은 선생님 + 안 겹침
    for(const {i,l} of sameSbjLanes){
      if(l.courses.some(x=>shareTeacher(x,c)) && l.courses.every(x=>!overlaps(x,c))){
        bestLane=i; break;
      }
    }

    // Pass 2: 안 겹침 + 이 lane이 다른 선생님 전용이 아닌 경우만
    // (선생님 없는 강좌는 어느 lane에나 가능)
    if(bestLane===-1){
      for(const {i,l} of sameSbjLanes){
        const noOvlp=l.courses.every(x=>!overlaps(x,c));
        const noTeacher=!c.teacher;
        const hasOtherTeacherOnly=l.courses.length>0 && !l.courses.some(x=>shareTeacher(x,c));
        if(noOvlp && (noTeacher || !hasOtherTeacherOnly)){ bestLane=i; break; }
      }
    }

    // Pass 3: 새 열
    if(bestLane===-1){
      lanes.push({subject:c.subject,courses:[]});
      bestLane=lanes.length-1;
    }

    lanes[bestLane].courses.push(c);
  }

  const SUBJ_ORDER={국어:0,수학:1,과탐:2,사탐:3,기타:4};
  lanes.sort((a,b)=>(SUBJ_ORDER[a.subject]??9)-(SUBJ_ORDER[b.subject]??9));
  return lanes.map(l=>l.courses);
}

function navigate(dir){
  const next=dateAddDays(getWeekStart(curDate),dir*7);
  if(!IS_ADMIN){
    const today0=new Date(); today0.setHours(0,0,0,0);
    if(dir<0){
      const pastLimit=new Date(today0); pastLimit.setDate(pastLimit.getDate()-21);
      if(next<pastLimit) return;
    }
    if(dir>0){
      const futureLimit=new Date(today0); futureLimit.setDate(futureLimit.getDate()+21);
      if(next>futureLimit) return;
    }
  }
  curDate=next;
  render();
}
function goToday(){
  curDate=new Date();
  curDate.setHours(0,0,0,0);
  render();
  scrollToToday('smooth');
}

function scrollToToday(behavior){
  setTimeout(()=>{
    const outer=document.querySelector('.cal-outer');
    const todayHead=document.querySelector('.today-head');
    if(!outer||!todayHead) return;
    const outerRect=outer.getBoundingClientRect();
    const headRect=todayHead.getBoundingClientRect();
    // 오늘 열의 왼쪽이 cal-outer 왼쪽에서 얼마나 떨어져 있는지
    const scrollLeft=outer.scrollLeft+(headRect.left-outerRect.left)-48; // 시간 컬럼(48px) 보정
    outer.scrollTo({left:Math.max(0,scrollLeft),behavior:behavior||'smooth'});
  },150);
}

function getWeekStart(d){
  // 해당 날짜가 속한 목~수 주의 목요일 반환
  const day=d.getDay(); // 0=일,1=월,...,4=목,5=금,6=토
  const offset=(day-4+7)%7; // 목(4) 기준으로 며칠 전인지
  const r=new Date(d);
  r.setDate(r.getDate()-offset);
  r.setHours(0,0,0,0);
  return r;
}
function getDaysToRender(){
  // curDate가 속한 목~수 7일
  const start=getWeekStart(curDate);
  return Array.from({length:7},(_,i)=>dateAddDays(start,i));
}

function updateNavLabel(){
  const days=getDaysToRender();
  document.getElementById('nav-label').textContent=
    `${fmtDate(days[0])} ~ ${fmtDate(days[6])}`;
  // 뷰어: 30일 이전으로 못 가면 왼쪽 화살표 비활성화
  const prevBtn=document.getElementById('nav-prev');
  if(prevBtn && !IS_ADMIN){
    const limit=new Date();
    limit.setHours(0,0,0,0);
    limit.setDate(limit.getDate()-21);
    const prevWeek=dateAddDays(getWeekStart(new Date(days[0])),-7);
    const disabled=prevWeek<limit;
    prevBtn.disabled=disabled;
    prevBtn.style.opacity=disabled?'0.3':'1';
    prevBtn.style.cursor=disabled?'not-allowed':'pointer';
    // 우측 화살표 비활성화 (미래 3주 이후)
    const nextBtn=document.getElementById('nav-next');
    if(nextBtn){
      const futureLimit=new Date(); futureLimit.setHours(0,0,0,0);
      futureLimit.setDate(futureLimit.getDate()+21);
      const nextWeek=dateAddDays(getWeekStart(new Date(days[0])),7);
      const nextDisabled=nextWeek>futureLimit;
      nextBtn.disabled=nextDisabled;
      nextBtn.style.opacity=nextDisabled?'0.3':'1';
      nextBtn.style.cursor=nextDisabled?'not-allowed':'pointer';
    }
    // 현재 주가 3주 이전이면 배너 표시
    const banner=document.getElementById('viewer-limit-banner');
    if(banner){
      const weekStart=getWeekStart(new Date(days[0]));
      const limitStart=new Date();
      limitStart.setHours(0,0,0,0);
      limitStart.setDate(limitStart.getDate()-21);
      const futureLimit2=new Date(); futureLimit2.setHours(0,0,0,0);
      futureLimit2.setDate(futureLimit2.getDate()+21);
      banner.style.display=(weekStart<limitStart||weekStart>futureLimit2)?'block':'none';
    }
  }
}

function courseActiveOn(c, dateIso){
  if(c.startDate && dateIso < c.startDate) return false;
  if(c.endDate   && dateIso > c.endDate)   return false;
  return true;
}
function getReplacesOn(dateIso){
  return replaces.filter(r=>r.replDate===dateIso);
}
function render(){

  grid.innerHTML='';

  const today=new Date(); today.setHours(0,0,0,0);
  const days=getDaysToRender();
  const SUBJ_ORDER=['국어','수학','과탐','사탐','기타'];

  // ── 1. 각 요일별 과목별 lane 계산 ──
  // dayGroups[di] = { 국어:[lane,lane,...], 수학:[lane,...], ... }
  const dayGroups=days.map(d=>{
    const kr=dayKr(d);

    // 뷰어: 과거 3주 이전 / 미래 3주 이후는 빈 열
    if(!IS_ADMIN){
      const today0=new Date(); today0.setHours(0,0,0,0);
      const pastLimit=new Date(today0); pastLimit.setDate(pastLimit.getDate()-21);
      const futureLimit=new Date(today0); futureLimit.setDate(futureLimit.getDate()+21);
      if(d<pastLimit||d>futureLimit) return computeLanes([]);
    }
    const sameDayReplaces=replaces.filter(r=>r.courseId&&r.origDate===iso&&r.sameDay&&r.replDate===iso);
    const dayCourses=courses.filter(c=>{
      if(!c.days.includes(kr)) return false;
      if(!courseActiveOn(c,iso)) return false;
      if(replaces.some(r=>r.courseId===c.id&&r.origDate===iso&&!r.sameDay)) return false;
      if(sameDayReplaces.some(r=>r.courseId===c.id)) return false;
      if(!activeSubs.has('전체')&&!activeSubs.has(c.subject)) return false;
      if(!activeTypes.has('전체')&&!activeTypes.has(c.type)) return false;
      return true;
    });
    const replOn=getReplacesOn(iso);
    // 같은 날 변경 강좌
    const sameDayCourses=sameDayReplaces.map(r=>{
      const orig=courses.find(c=>c.id===r.courseId);
      if(!orig) return null;
      return {...orig,_isReplace:true,_replaceId:r.id,_reason:r.reason,_origDate:r.origDate,
        start:r.start||orig.start,end:r.end||orig.end,room:r.room||orig.room,_sameDay:true};
    }).filter(Boolean).filter(c=>{
      if(!activeSubs.has('전체')&&!activeSubs.has(c.subject)) return false;
      if(!activeTypes.has('전체')&&!activeTypes.has(c.type)) return false;
      return true;
    });
    const replaceCourses=replOn.filter(r=>!r.sameDay).map(r=>{
      const orig=courses.find(c=>c.id===r.courseId);
      if(!orig) return null;
      return {...orig,_isReplace:true,_replaceId:r.id,_reason:r.reason,_origDate:r.origDate,
        start:r.start||orig.start,end:r.end||orig.end,
        room:r.room||orig.room,
        _sameDay:r.sameDay||false};
    }).filter(Boolean).filter(c=>{
      if(!activeSubs.has('전체')&&!activeSubs.has(c.subject)) return false;
      if(!activeTypes.has('전체')&&!activeTypes.has(c.type)) return false;
      return true;
    });
    const lanes=computeLanes([...dayCourses,...replaceCourses,...sameDayCourses]);
    const bySubj={};
    lanes.forEach(lane=>{
      const s=lane[0]?.subject||'기타';
      if(!bySubj[s]) bySubj[s]=[];
      bySubj[s].push(lane);
    });
    return bySubj;
  });

  // ── 2~3. 열 스펙 빌드 (요일별 독립) ──
  // 각 요일별로 실제 강좌 있는 과목/lane만 열 생성
  // 강좌 없는 요일도 최소 1열 확보 (빈 날 표시용)
  const colSpec=[{type:'time'}];
  days.forEach((_,di)=>{
    const isLast=di===days.length-1;
    let added=0;
    SUBJ_ORDER.forEach(subj=>{
      const lanes=dayGroups[di][subj]||[];
      if(!lanes.length) return;
      for(let li=0;li<lanes.length;li++){
        colSpec.push({type:'lane',di,subject:subj,li,isEmpty:false,isLast:false});
        added++;
      }
    });
    if(added===0){
      colSpec.push({type:'lane',di,subject:'',li:0,isEmpty:true,isLast:false});
    }
    // 날짜 사이: 빈열 + 구분선열 + 빈열 (마지막 날짜 제외)
    if(!isLast){
      colSpec.push({type:'gap'});      // 빈열
      colSpec.push({type:'divider'});  // 구분선
      colSpec.push({type:'gap'});      // 빈열
    }
  });
  const activeSubjects=SUBJ_ORDER.filter(s=>days.some((_,di)=>(dayGroups[di][s]||[]).length>0));

  // CSS grid columns
  const isMobile=window.innerWidth<=768;
  const gapW=isMobile?'4px':'8px';
  const divW=isMobile?'1px':'2px';
  const laneW=isMobile?'minmax(72px,1fr)':'minmax(90px,1fr)';
  const colWidths=colSpec.map(s=>s.type==='time'?'48px':s.type==='gap'?gapW:s.type==='divider'?divW:laneW);
  grid.style.gridTemplateColumns=colWidths.join(' ');
  // 모바일 반응형용 열 수 CSS 변수
  document.documentElement.style.setProperty('--day-cols', colWidths.length-1);

  const specCol=i=>i+1; // 0-based → 1-based CSS

  const corner=document.createElement('div');

  const cafeCorner=document.createElement('div');
  cafeCorner.style.cssText='grid-column:1;grid-row:2;background:#FAFAF8;border-bottom:1px solid var(--bdr);border-right:1px solid var(--bdr);position:sticky;left:0;z-index:6;display:flex;align-items:center;justify-content:center;';
  cafeCorner.innerHTML='<span style="font-size:10px;color:#aaa;font-weight:400">스터디</span>';
  grid.appendChild(cafeCorner);

  // gap/divider 스터디카페 셀
  colSpec.forEach((sp,ci)=>{
    if(sp.type!=='gap'&&sp.type!=='divider') return;
    const sc=document.createElement('div');
    sc.style.cssText=`grid-column:${specCol(ci)};grid-row:2;background:${sp.type==='divider'?'#B0ADA6':'#F0EEE9'};border-bottom:1px solid var(--bdr)`;
    grid.appendChild(sc);
  });

  days.forEach((d,di)=>{
    const isToday=d.getTime()===today.getTime();

  });

  // ── 특이사항 행 ──
  {
    const workCorner=document.createElement('div');
    workCorner.style.cssText='grid-column:1;grid-row:3;background:#FAFAF8;border-bottom:1px solid var(--bdr);border-right:1px solid var(--bdr);position:sticky;left:0;z-index:6;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;';
    workCorner.innerHTML='<span style="font-size:10px;color:#aaa;font-weight:400">특이사항</span>';
    grid.appendChild(workCorner);

    // gap/divider 근무 셀
    colSpec.forEach((sp,ci)=>{
      if(sp.type!=='gap'&&sp.type!=='divider') return;
      const sc=document.createElement('div');
      sc.style.cssText=`grid-column:${specCol(ci)};grid-row:3;background:${sp.type==='divider'?'#B0ADA6':'#F0EEE9'};border-bottom:1px solid var(--bdr)`;
      grid.appendChild(sc);
    });

    days.forEach((d,di)=>{
      const kr=dayKr(d);
      const isToday=d.getTime()===today.getTime();
      const dayCols=colSpec.map((s,i)=>({s,i})).filter(({s})=>s.type==='lane'&&s.di===di);
      if(!dayCols.length) return;
      const firstCI=dayCols[0].i, lastCI=dayCols[dayCols.length-1].i;

  } // 상담실 행 끝 (비활성화)

  days.forEach((d,di)=>{
    const iso=isoDate(d);

    const firstCI=colSpec.findIndex(sp=>sp.type==='lane'&&sp.di===di);
    const lastCI=[...colSpec].map((sp,i)=>sp.type==='lane'&&sp.di===di?i:-1).filter(i=>i>=0).pop()??firstCI;
    const lastCIActual=lastCI;

    const dutyCell=document.createElement('div');
    dutyCell.className='duty-row'+(isToday?' today-col':'');
    dutyCell.style.cssText=`grid-column:${specCol(firstCI)} / ${specCol(lastCIActual)+1};grid-row:3;`;
    const dayDuty=duty.filter(dut=>dut.date===iso).flatMap(d=>d.names);
    if(dayDuty.length){
      // 내용 있을 때: 관리자/뷰어 모두 표시
      dutyCell.innerHTML=`<span class="duty-label">📋</span><span class="duty-name" onclick="${IS_ADMIN?`openDutyModal('${iso}')`:''}">${dayDuty.join(', ')}</span>`;

      // 내용 없고 관리자: + 추가 버튼
      dutyCell.innerHTML=`<span class="duty-empty" onclick="openDutyModal('${iso}')">+ 상담실</span>`;
    }
    // 내용 없고 뷰어: 아무것도 표시 안 함 (빈 셀)
    grid.appendChild(dutyCell);
  });

  // ── 5. 시간 셀 + 강좌 셀 ──
  const ROW_OFFSET=4; // 헤더+스터디+특이사항+슬롯
  for(let s=0;s<TOTAL_SLOTS;s++){
    const mins=START_H*60+s*SLOT_MIN;

    const row=s+ROW_OFFSET;

    const tc=document.createElement('div');

  // ── 6. 이벤트 배치 ──
  days.forEach((d,di)=>{
    const bySubj=dayGroups[di];

      const lanes=bySubj[subj]||[];

          const ss=Math.round((sm-START_H*60)/SLOT_MIN);
          const es=Math.round((em-START_H*60)/SLOT_MIN);

          const spanRows=Math.max(es-ss,1);

          const ev=document.createElement('div');

          ev.style.width='auto';
          ev.style.minWidth='0';
          ev.style.maxWidth='100%';
          ev.style.boxSizing='border-box';
          ev.style.overflow='hidden';
          // ── 먼저 선언 ──

          const isClosed=!isReplace&&holidays.some(h=>
            h.date===dateStr2 &&
            (h.scope==='all' || (h.scope==='course' && h.courseId===c.id))

          ev.dataset.id=c.id;ev.dataset.subject=c.subject;ev.dataset.type=c.type;
          if(c.type==='클리닉'){
            ev.classList.add('ev-type-clinic');
            const accentMap={국어:'var(--red-m)',수학:'var(--blue-m)',과탐:'var(--violet-m)',사탐:'var(--amber-m)'};
            const accent=accentMap[c.subject]||'#888';
            ev.style.setProperty('--clinic-accent',accent);
          }

function isoDate(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())}

// 특정 날짜가 강좌의 몇 번째 수업인지 계산
function calcSessionNum(c, dateIso){
  if(!c.startDate||!c.totalCount) return null;
  const DAY_NUM={일:0,월:1,화:2,수:3,목:4,금:5,토:6};
  const dayNums=c.days.map(d=>DAY_NUM[d]).filter(n=>n!==undefined);
  if(!dayNums.length) return null;
  const start=new Date(c.startDate);
  const target=new Date(dateIso);
  if(target<start) return null;
  // 시작일부터 target까지 해당 요일 수 세기
  let count=0;
  const cur=new Date(start);
  while(cur<=target){
    if(dayNums.includes(cur.getDay())) count++;
    cur.setDate(cur.getDate()+1);
  }
  return count>0?count:null;
}

const STUDY_CAFE_HOURS={
  default:'평일 16:00~24:00',
  weekday:'16:00~24:00',
  saturday:'09:00~24:00',
  sunday:'09:00~22:00',
  holiday:'09:00~22:00',
};

function getDefaultCafeHours(iso){
  if(KR_HOLIDAYS[iso]) return {hours:STUDY_CAFE_HOURS.holiday};
  const d=new Date(iso);
  const day=d.getDay();
  if(day===6) return {hours:STUDY_CAFE_HOURS.saturday};
  if(day===0) return {hours:STUDY_CAFE_HOURS.sunday};
  return {hours:STUDY_CAFE_HOURS.weekday};
}
function getStudyCafeHours(iso){
  // 직접 설정된 시간 우선
  const custom=dateEvents.find(e=>e.date===iso&&e.type==='운영시간');
  if(custom) return {hours:custom.content,isCustom:true};
  // 공휴일
  if(KR_HOLIDAYS[iso]) return {hours:STUDY_CAFE_HOURS.holiday,isCustom:false,label:'공휴일'};
  // 요일별
  const d=new Date(iso);
  const day=d.getDay();
  if(day===6) return {hours:STUDY_CAFE_HOURS.saturday,isCustom:false};
  if(day===0) return {hours:STUDY_CAFE_HOURS.sunday,isCustom:false};
  return {hours:STUDY_CAFE_HOURS.weekday,isCustom:false};
}

function getDateInfo(iso){
  const result=[];
  if(KR_HOLIDAYS[iso]) result.push({content:KR_HOLIDAYS[iso],type:'공휴일'});
  if(MOCK_EXAMS[iso]) result.push({content:MOCK_EXAMS[iso],type:'모의고사'});
  // Sheets에서 로드한 이벤트
  dateEvents.filter(e=>e.date===iso).forEach(e=>result.push({content:e.content,type:e.type}));
  return result;
}

function checkConflicts(data){
  // Returns list of conflicting course names (excluding self)
  const conflicts=[];
  for(const c of courses){
    if(c.id===data.id) continue;
    const sharedDays=data.days.filter(d=>c.days.includes(d));
    if(sharedDays.length && overlaps(data,c)){
      conflicts.push(`[${c.subject}] ${c.name} (${c.teacher||''}, ${sharedDays.join('·')}요일 ${c.start}~${c.end})`);
    }
  }
  return conflicts;
}

function saveCourse(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('강좌명을 입력해주세요');return}
  const days=[...document.querySelectorAll('#day-checks .day-row')].filter(row=>row.querySelector('input[type=checkbox]')?.checked).map(row=>row.dataset.day);
  if(!days.length){alert('요일을 하나 이상 선택해주세요');return}
  const data={
    id:editingId||nextId(),
    type:document.getElementById('f-type').value,
    subject:document.getElementById('f-subject').value,
    name,
    teacher:document.getElementById('f-teacher').value.trim(),
    start:(()=>{const t=collectDayTimes();return Object.values(t)[0]?.start||'';})(),
    end:(()=>{const t=collectDayTimes();return Object.values(t)[0]?.end||'';})(),
    days,
    dayTimes:collectDayTimes(),
    room:       document.getElementById('f-room').value.trim(),
    startDate:  document.getElementById('f-startdate').value,
    endMode:    document.getElementById('f-endmode').value,
    totalCount: parseInt(document.getElementById('f-totalcount').value)||0,
    endDate:    (()=>{const m=document.getElementById('f-endmode').value;
                  return m==='직접'?document.getElementById('f-enddate').value
                        :m==='회차'?document.getElementById('f-enddate-calc').value:'';})(),
    memo:document.getElementById('f-memo').value.trim()
  };
  // Conflict check — show warning but allow save (lanes will handle it)
  const conflicts=checkConflicts(data);
  const warn=document.getElementById('conflict-warn');
  if(conflicts.length){
    warn.style.display='block';
    warn.textContent='⚠ 겹치는 강좌가 있어 옆 열에 배치됩니다: '+conflicts.slice(0,2).join(' / ')+(conflicts.length>2?` 외 ${conflicts.length-2}개`:'');
  } else {
    warn.style.display='none';
  }
  if(editingId){
    const idx=courses.findIndex(x=>x.id===editingId);
    if(idx>-1) courses[idx]=data;
  } else {
    courses.push(data);
  }
  save();closeOverlay();render();
  // Sheets 동기화
  const saved=courses.find(x=>x.id===data.id)||data;
  sheetPost('saveCourse',{
    id:saved.id,type:saved.type,subject:saved.subject,name:saved.name,
    teacher:saved.teacher,days:saved.days,start:saved.start,end:saved.end,
    room:saved.room||'',memo:saved.memo||'',
    startDate:saved.startDate||'',endMode:saved.endMode||'없음',
    totalCount:saved.totalCount||0,endDate:saved.endDate||'',
    dayTimes:saved.dayTimes||{}
  });
}

function saveHolidayMulti(){
  const scope=document.getElementById('h-scope').value;
  const courseId=scope==='course'?document.getElementById('h-course').value:'';
  const reason=document.getElementById('h-reason').value.trim();
  const rows=document.querySelectorAll('#h-date-ranges .date-range-row');
  if(!rows.length){alert('날짜 구간을 하나 이상 추가해주세요');return}

  let added=0;
  rows.forEach(row=>{
    const startStr=row.querySelector('.dr-start').value;
    const endStr=row.querySelector('.dr-end').value;
    if(!startStr||!endStr){return;}
    const start=new Date(startStr), end=new Date(endStr);
    if(start>end){alert(`날짜 순서가 잘못됐습니다: ${startStr} ~ ${endStr}`);return;}
    // 구간 내 모든 날짜에 휴강 등록
    const cur=new Date(start);
    while(cur<=end){
      const dateIso=isoDate(cur);
      if(scope==='all'){
        holidays=holidays.filter(h=>!(h.date===dateIso&&h.scope==='all'));
      } else {
        holidays=holidays.filter(h=>!(h.date===dateIso&&h.scope==='course'&&h.courseId===courseId));
      }
      holidays.push({date:dateIso,scope,courseId,reason});
      sheetPost('saveHoliday',{date:dateIso,scope,courseId,reason});
      added++;
      cur.setDate(cur.getDate()+1);
    }
  });

  if(added>0){
    saveHolidays();closeHolidayOverlay();render();
  }
}

      // 전체 클릭 → 나머지 해제, 전체만 선택

    } else {
      set.delete('전체'); // 전체 해제
      if(set.has(v)) {
        set.delete(v); // 이미 선택된 것 해제
        if(set.size===0) set.add('전체'); // 아무것도 없으면 전체로
      } else {
        set.add(v);
      }
    }

    // UI 업데이트
    document.querySelectorAll(`[data-f="${f}"]`).forEach(b=>{
      const bv=b.dataset.v;
      b.className='chip';
      if(set.has(bv)) b.classList.add(bv==='전체'?'on':'on-'+bv);
    });
    render();
  });
});

// ── DAY TIME FUNCTIONS ──
const ALL_DAYS=['월','화','수','목','금','토','일'];

function buildDayChecks(presetDay, existingDayTimes, checkedDays){
  const container=document.getElementById('day-checks');
  container.innerHTML='';
  ALL_DAYS.forEach(day=>{
    const isChecked=presetDay?day===presetDay:(checkedDays||[]).includes(day);
    const dt=(existingDayTimes||{})[day]||null;
    const defaultT=dt||{start:document.getElementById('f-start').value||'09:00',end:document.getElementById('f-end').value||'12:00'};

    const row=document.createElement('div');
    row.className='day-row';row.dataset.day=day;
    row.style.cssText='display:flex;align-items:center;gap:8px;padding:4px 0';

    // 체크박스 + 요일
    const chkLabel=document.createElement('label');
    chkLabel.style.cssText='display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;min-width:36px;font-weight:500';
    chkLabel.innerHTML=`<input type="checkbox" value="${day}"${isChecked?' checked':''}> ${day}`;
    row.appendChild(chkLabel);

    // 시간 입력 (체크 시 바로 표시)
    const timeInputs=document.createElement('div');
    timeInputs.className='day-time-inputs';
    timeInputs.style.display=isChecked?'flex':'none';
    timeInputs.style.cssText=`display:${isChecked?'flex':'none'};align-items:center;gap:4px`;
    timeInputs.innerHTML=`
      <input type="time" class="dt-start" value="${defaultT.start}" style="font-size:11px;padding:3px 5px;border:1px solid var(--bdr);border-radius:6px;width:78px;font-family:inherit">
      <span style="color:#aaa;font-size:11px">~</span>
      <input type="time" class="dt-end" value="${defaultT.end}" style="font-size:11px;padding:3px 5px;border:1px solid var(--bdr);border-radius:6px;width:78px;font-family:inherit">
    `;
    row.appendChild(timeInputs);

    // 체크 토글
    const cb=chkLabel.querySelector('input');
    cb.addEventListener('change',()=>{
      timeInputs.style.display=cb.checked?'flex':'none';
      if(document.getElementById('f-endmode')?.value==='회차') updateCalcEndDate();
    });

    container.appendChild(row);
  });
}

function removeDayTime(btn){
  const row=btn.closest('.day-row');
  row.querySelector('.day-time-inputs').style.display='none';
  const t=row.querySelector('.day-time-toggle');
  t.textContent='+ 시간 다름';t.style.background='';
}

function collectDayTimes(){
  const result={};
  document.querySelectorAll('#day-checks .day-row').forEach(row=>{
    const day=row.dataset.day;
    const cb=row.querySelector('input[type=checkbox]');
    if(!cb||!cb.checked) return;
    const s=row.querySelector('.dt-start')?.value;
    const e=row.querySelector('.dt-end')?.value;
    if(s&&e) result[day]={start:s,end:e};
  });
  return result;
}

function openReplaceModal(courseId,origDate){
  hideDP();
  const c=courses.find(x=>x.id===courseId);if(!c)return;
  document.getElementById('r-course-name').textContent=`[${c.subject}] ${c.name}`;
  document.getElementById('r-orig-date').textContent=origDate;
  document.getElementById('r-repl-date').value=origDate; // 기본값: 같은 날 (강의실/시간만 변경)
  document.getElementById('r-start').value=c.start;
  document.getElementById('r-end').value=c.end;
  document.getElementById('r-room').value=c.room||'';
  document.getElementById('r-reason').value='';
  document.getElementById('r-course-id').value=courseId;
  document.getElementById('r-orig-date-val').value=origDate;
  document.getElementById('replace-overlay').classList.add('open');
}
function closeReplaceOverlay(){document.getElementById('replace-overlay').classList.remove('open')}

function saveReplace(){
  const courseId=document.getElementById('r-course-id').value;
  const origDate=document.getElementById('r-orig-date-val').value;
  const replDate=document.getElementById('r-repl-date').value;
  if(!replDate){alert('대체 날짜를 선택해주세요');return}
  const start=document.getElementById('r-start').value;
  const end=document.getElementById('r-end').value;
  const room=document.getElementById('r-room').value.trim();
  const reason=document.getElementById('r-reason').value.trim();
  const sameDay=origDate===replDate;
  const id='R'+Date.now();
  const data={id,courseId,origDate,replDate,start,end,room,reason,sameDay};
  replaces.push(data);
  // 날짜가 다를 때만 원래 날짜 휴강 처리
  if(!sameDay){
    holidays.push({date:origDate,scope:'course',courseId,reason:`대체수업(${replDate})`});
    saveHolidays();
    sheetPost('saveHoliday',{date:origDate,scope:'course',courseId,reason:`대체수업(${replDate})`});
  }
  closeReplaceOverlay();render();
  sheetPost('saveReplace',data);
}
function deleteReplace(replaceId,origDate,courseId){
  const r=replaces.find(x=>x.id===replaceId);
  replaces=replaces.filter(x=>x.id!==replaceId);
  if(r&&!r.sameDay){
    holidays=holidays.filter(h=>!(h.date===origDate&&h.scope==='course'&&h.courseId===courseId&&(h.reason||'').startsWith('대체수업')));
    saveHolidays();
    sheetPost('deleteHoliday',{date:origDate,scope:'course',courseId});
  }
  hideDP();render();
  sheetPost('deleteReplace',{id:replaceId});
}

function onEndModeChange(){
  const m=document.getElementById('f-endmode').value;
  document.getElementById('f-enddate-wrap').style.display=m==='직접'?'':'none';
  document.getElementById('f-totalcount-wrap').style.display=m==='회차'?'':'none';
  document.getElementById('f-enddate-calc-wrap').style.display=m==='회차'?'':'none';
}
function updateCalcEndDate(){
  const sd=document.getElementById('f-startdate').value;
  const tc=parseInt(document.getElementById('f-totalcount').value)||0;
  const days=[...document.querySelectorAll('#day-checks .day-row')].filter(row=>row.querySelector('input[type=checkbox]')?.checked).map(row=>row.dataset.day);
  if(!sd||!tc||!days.length){document.getElementById('f-enddate-calc').value='';return;}
  const DN={일:0,월:1,화:2,수:3,목:4,금:5,토:6};
  const dns=days.map(d=>DN[d]);
  let cnt=0,cur=new Date(sd),last=new Date(sd);
  for(let i=0;i<365*5;i++){
    if(dns.includes(cur.getDay())){cnt++;last=new Date(cur);if(cnt>=tc)break;}
    cur.setDate(cur.getDate()+1);
  }
  document.getElementById('f-enddate-calc').value=last.toISOString().slice(0,10);
}
document.addEventListener('change',e=>{
  if(e.target.closest&&(e.target.closest('#day-checks')||e.target.id==='f-totalcount'||e.target.id==='f-startdate')){
    const em=document.getElementById('f-endmode');
    if(em&&em.value==='회차') updateCalcEndDate();
  }
});

(async()=>{
  updateNavBarTop();
  window.addEventListener('resize', updateNavBarTop);
  // 관리자 모드 UI
  if(IS_ADMIN){
    // 비밀번호 입력
    let pw=sessionStorage.getItem('admin_pw');
    if(!pw){
      pw=prompt('관리자 비밀번호를 입력하세요:');
      if(!pw){ location.replace(location.pathname); return; }
    }
    // 서버에서 비밀번호 검증
    showLoading(true);
    try{
      const verifyRes=await fetch(SCRIPT_URL,{
        method:'POST',
        redirect:'follow',
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({password:pw,action:'saveCourse',data:{id:'__verify__',type:'',subject:'',name:'__verify__',teacher:'',days:[],start:'',end:'',room:'',memo:'',startDate:'',endMode:'없음',totalCount:0,endDate:''}})
      }).then(r=>r.json());

      if(verifyRes.ok===false && verifyRes.error==='unauthorized'){
        sessionStorage.removeItem('admin_pw');
        showLoading(false);
        alert('❌ 비밀번호가 올바르지 않습니다.');
        location.replace(location.pathname);
        return;
      }
      // 인증 성공 - 검증용 데이터 삭제
      if(verifyRes.ok){
        await fetch(SCRIPT_URL,{
          method:'POST',redirect:'follow',
          headers:{'Content-Type':'text/plain'},
          body:JSON.stringify({password:pw,action:'deleteCourse',data:{id:'__verify__'}})
        });
      }
    }catch(e){
      // 네트워크 오류 시에도 차단
      sessionStorage.removeItem('admin_pw');
      showLoading(false);
      alert('❌ 서버 연결 실패. 관리자 접속을 할 수 없습니다.');
      location.replace(location.pathname);
      return;
    }
    sessionStorage.setItem('admin_pw',pw);
    showLoading(false);
    document.getElementById('admin-btns').style.display='flex';
    document.getElementById('admin-login-btn').style.display='none';
    document.getElementById('viewer-bar').style.display='none';
    document.title='CODE3 시간표 [관리자]';
  } else {
    document.getElementById('admin-btns').style.display='none';
    document.getElementById('admin-login-btn').style.display='';
    document.getElementById('viewer-bar').style.display='block';
  }
  await load();
  updateCount();
  render();
  scrollToToday('instant');
})();
